<!-- This project is a stock return tracker. The user inputs there holdings, 
the price they bought the stock at and the current price. The code will 
determine the total gain/loss from the investment, and how much money the 
user owns -->

<!-- Title -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Investment Portfolio Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">

    <!-- LEFT: inputs and data -->
    <div class="left-panel">
      <h1>Investment Portfolio Tracker</h1>
      <h3>Add a Stock</h3>
      <input type="text" id="ticker" placeholder="Ticker (e.g. NVDA)">
      <input type="number" id="shares" placeholder="Shares">
      <input type="number" id="buyPrice" placeholder="Buy Price">
      <input type="number" id="currentPrice" placeholder="Current Price">
      <button id="addBtn">Add Stock</button>
      <button id="clearBtn">Clear Input</button>
      <button id="clearPortfolio">Clear Portfolio</button>
      <p id="msg"></p>
      <p id="totalInvested"></p>
      <p id="totalValue"></p>
      <p id="result"></p>
      <ol id="portfolioDisplay"></ol>
    </div>

    <!-- RIGHT: charts -->
    <div class="right-panel">
      <div class="chart-card"><canvas id="pieChart"></canvas></div>
      <div class="chart-card"><canvas id="barChart"></canvas></div>
    </div>

  </div>
</body>
</html>
